<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NAME IT SCENTS</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">



<!-- firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
     <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
     <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
     <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-flex">
      <div class="nav-logo">
        <img src="./assets/working logos.png" alt="NAME IT">
      </div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="collection.html" class="nav-link">Collection</a></li>
        <li><a href="index.html#products" class="nav-link">Products</a></li>
        <li><a href="index.html#contact" class="nav-link">Contact Us</a></li>
      </ul>
      <div class="nav-right">
        <!-- <div class="nav-actions">
          <form class="search-form">
            <input type="text" placeholder="search">
            <button type="submit"><i class="fas fa-search"></i></button>
          </form>
          <a href="cart.html" class="cart-link"><i class="fas fa-shopping-bag"></i></a>
        </div> -->
        <div class="nav-buttons">
          <a href="login.html" class="btn btn-outline active" id="loginBtn">Login</a>
          <a href="signup.html" class="btn btn-primary" id="signUpBtn">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <section class="auth-section">
    <div class="container">
      <div class="auth-container">
        <div class="auth-image">
          <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80" alt="Luxury Perfume">
          <div class="auth-overlay">
            <h2>Welcome Back</h2>
            <p>Sign in to your account and continue your fragrance journey</p>
          </div>
        </div>
        <div class="auth-form-container">
          <div class="auth-header">
            <h1>Sign In</h1>
            <p>Enter your credentials to access your account</p>
          </div>
          
          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label for="email">Email Address</label>
              <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" required>
                <button type="button" class="password-toggle" id="password-toggle">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <div class="form-options login-options">
              <label class="checkbox-wrapper">
                <input type="checkbox" id="remember-me">
                <span class="checkmark"></span>
                Remember me
              </label>
              <a href="#" class="forgot-password">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-dark auth-btn">
              <span>Sign In</span>
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>
          
          <div class="auth-divider">
            <span>or</span>
          </div>
          
          <div class="social-login">
            <button class="social-btn google-btn">
              <i class="fab fa-google"></i>
              <span>Continue with Google</span>
            </button>
            <button class="social-btn facebook-btn">
              <i class="fab fa-facebook-f"></i>
              <span>Continue with Facebook</span>
            </button>
          </div>
          
          <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="./js/firebase-config.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
