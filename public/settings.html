<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Settings - NAME IT SCENTS</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- Navigation (same as homepage) -->
  <nav class="navbar">
    <div class="container nav-flex">
      <div class="nav-logo">NAME IT SCENTS</div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="collection.html" class="nav-link">Collection</a></li>
        <li><a href="index.html#products" class="nav-link">Products</a></li>
        <li><a href="index.html#contact" class="nav-link">Contact Us</a></li>
      </ul>
      <div class="nav-actions">
        <form class="search-form">
          <input type="text" placeholder="search">
          <button type="submit"><i class="fas fa-search"></i></button>
        </form>
        <a href="cart.html" class="cart-link"><i class="fas fa-shopping-bag"></i></a>
      </div>
    </div>
  </nav>
  <main class="container" id="settings-main">
    <h1>User Settings</h1>
    <form id="settings-form">
      <div class="form-group">
        <label for="settings-password">Change Password</label>
        <input type="password" id="settings-password">
        <button type="button" id="change-password-btn" class="btn btn-dark">Change Password</button>
      </div>
      <div class="form-group">
        <label for="settings-address">Change Address</label>
        <input type="text" id="settings-address">
        <button type="button" id="change-address-btn" class="btn btn-dark">Change Address</button>
      </div>
      <div class="form-group">
        <button type="button" id="delete-account-btn" class="btn btn-dark">Delete Account</button>
      </div>
    </form>
  </main>
  <script src="js/main.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
