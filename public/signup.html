<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - NAME IT SCENTS</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">


<!-- firebase v8 -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
     <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
     <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
     <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container nav-flex">
      <div class="nav-logo">
        <img src="./assets/working logos.png" alt="NAME IT">
      </div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="collection.html" class="nav-link">Collection</a></li>
        <li><a href="index.html#products" class="nav-link">Products</a></li>
        <li><a href="index.html#contact" class="nav-link">Contact Us</a></li>
      </ul>
      <div class="nav-right">
        <!-- <div class="nav-actions">
          <form class="search-form">
            <input type="text" placeholder="search">
            <button type="submit"><i class="fas fa-search"></i></button>
          </form>
          <a href="cart.html" class="cart-link"><i class="fas fa-shopping-bag"></i></a>
        </div> -->
        <div class="nav-buttons">
          <a href="login.html" class="btn btn-outline" id="loginBtn">Login</a>
          <a href="signup.html" class="btn btn-primary active" id="signUpBtn">Sign Up</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Sign Up Section -->
  <section class="auth-section">
    <div class="container">
      <div class="auth-container">
        <div class="auth-image">
          <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80" alt="Luxury Perfume Collection">
          <div class="auth-overlay">
            <h2>Join Our Community</h2>
            <p>Create your account and start your fragrance journey with exclusive access to premium perfumes</p>
          </div>
        </div>
        <div class="auth-form-container">
          <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join us and discover the world of luxury fragrances</p>
          </div>
          
          <form id="signupForm" class="auth-form">
            <div class="form-row">
              <div class="form-group">
                <label for="firstname">First Name</label>
                <div class="input-wrapper">
                  <i class="fas fa-user"></i>
                  <input type="text" id="firstname" placeholder="Enter your first name" required>
                </div>
              </div>
              <div class="form-group">
                <label for="lastname">Last Name</label>
                <div class="input-wrapper">
                  <i class="fas fa-user"></i>
                  <input type="text" id="lastname" placeholder="Enter your last name" required>
                </div>
              </div>
            </div>
            
            <div class="form-group">
              <label for="email">Email Address</label>
              <div class="input-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="signupPhone">Phone Number</label>
              <div class="input-wrapper">
                <i class="fas fa-phone"></i>
                <input type="tel" id="signupPhone" placeholder="Enter your phone number" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="signup-password">Password</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="signup-password" placeholder="Create a password" required>
                <button type="button" class="password-toggle" id="signup-password-toggle">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <div class="form-group">
              <label for="signup-confirm-password">Confirm Password</label>
              <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="signup-confirm-password" placeholder="Confirm your password" required>
                <button type="button" class="password-toggle" id="signup-confirm-toggle">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            
            <div class="form-options">
              <label class="checkbox-wrapper">
                <input type="checkbox" id="terms-agreement" required>
                <span class="checkmark"></span>
                I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
              </label>
              <label class="checkbox-wrapper">
                <input type="checkbox" id="newsletter-signup">
                <span class="checkmark"></span>
                Subscribe to our newsletter for exclusive offers
              </label>
            </div>
            
            <button type="submit" class="btn btn-dark auth-btn">
              <span>Create Account</span>
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>
          
          <div class="auth-divider">
            <span>or</span>
          </div>
          
          <div class="social-login">
            <button class="social-btn google-btn">
              <i class="fab fa-google"></i>
              <span>Continue with Google</span>
            </button>
            <button class="social-btn facebook-btn">
              <i class="fab fa-facebook-f"></i>
              <span>Continue with Facebook</span>
            </button>
          </div>
          
          <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="./js/firebase-config.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
